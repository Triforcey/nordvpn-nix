name: Update NordVPN

# Checks the NordVPN apt mirror for a newer release and, if found, bumps
# pkgs/nordvpn/source.json, verifies it builds, and opens a pull request.
on:
  schedule:
    # Daily at 06:17 UTC (off the top of the hour to be polite to runners).
    - cron: "17 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-nordvpn
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Run updater
        id: update
        run: nix run .#update

      - name: Build updated package
        if: steps.update.outputs.updated == 'true'
        run: nix build .#nordvpn --print-build-logs

      - name: Create pull request
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "nordvpn: ${{ steps.update.outputs.old_version }} -> ${{ steps.update.outputs.new_version }}"
          title: "nordvpn: ${{ steps.update.outputs.old_version }} -> ${{ steps.update.outputs.new_version }}"
          body: |
            Automated NordVPN version bump.

            - **Old:** `${{ steps.update.outputs.old_version }}`
            - **New:** `${{ steps.update.outputs.new_version }}`

            `pkgs/nordvpn/source.json` was updated and `nix build .#nordvpn`
            succeeded on this runner.

            > Generated by `.github/workflows/update.yml`.
          branch: auto/nordvpn-update
          delete-branch: true
          labels: automated, dependencies
